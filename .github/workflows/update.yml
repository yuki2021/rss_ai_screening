name: update-feed

on:
  schedule:
    - cron: "0 21,6 * * *"  # UTC 21:00 = JST 06:00, UTC 06:00 = JST 15:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-multilingual-e5-small-v1

      - name: Cache state DB
        uses: actions/cache@v4
        with:
          path: data/state.db
          key: state-db-${{ github.run_id }}
          restore-keys: state-db-

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run pipeline
        env:
          RAINDROP_TOKEN: ${{ secrets.RAINDROP_TOKEN }}
          INOREADER_FEED_URL: ${{ secrets.INOREADER_FEED_URL }}
        run: uv run python -m src.main

      - name: Commit RSS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/custom.xml
          git diff --cached --quiet || git commit -m "chore: update feed [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
